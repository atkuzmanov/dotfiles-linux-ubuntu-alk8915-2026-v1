add_newline = false

format = """
$directory$git_branch$git_status$nodejs$java$docker_context$cmd_duration
$character
"""

[directory]
truncation_length = 3

[git_branch]
symbol = " "

[git_status]
format = "[$all_status$ahead_behind]($style)"

[cmd_duration]
min_time = 500
format = "took [$duration](yellow)"

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"

